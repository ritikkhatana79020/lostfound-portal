spring.application.name=lostfound-portal

# ============================================
# PostgreSQL Configuration
# ============================================
# NOTE: These settings MUST match your DBeaver PostgreSQL connection
# DBeaver Settings:
#   Host: localhost
#   Port: 5432
#   Database: lostfound
#   Username: postgres
#   Password: postgres
# 
# If you change PostgreSQL credentials, update BOTH DBeaver AND here
# See: DBEAVER_APP_PROPERTIES_SYNC.md for details
# ============================================

spring.datasource.url=jdbc:postgresql://localhost:5432/lostfound
spring.datasource.username=ritikkhatana
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pooling (HikariCP - automatically used by Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# ============================================
# JPA/Hibernate Configuration
# ============================================
# ddl-auto: update (creates/updates schema automatically)
# show-sql: true (logs SQL - set to false in production)
# ============================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20

# ============================================
# Server Configuration
# ============================================
server.port=8081
server.servlet.context-path=/

# ============================================
# CORS Configuration (for Frontend)
# ============================================
# Allows requests from localhost frontend
# Update 'allowed-origins' for production domains
# ============================================

spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:8080
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

